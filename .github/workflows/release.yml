name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from Cargo.toml
        id: ver
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: ubuntu-latest
          #   artifact: babushka-linux-x86_64
          #   binary: target/release/babushka

          # - os: macos-latest
          #   artifact: babushka-macos-x86_64
          #   binary: target/release/babushka

          - os: windows-latest
            artifact: babushka-windows-x86_64.exe
            binary: target/release/babushka.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # - name: Install Linux system deps
      #   if: runner.os == 'Linux'
      #   run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev

      - name: Build
        run: cargo build --release

      - name: Rename binary
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Zip binary (for self-update)
        shell: pwsh
        run: Compress-Archive -Path babushka-windows-x86_64.exe -DestinationPath babushka-windows-x86_64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            babushka-windows-x86_64.exe
            babushka-windows-x86_64.zip

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-assets
          path: artifacts

      - name: Delete existing release if exists
        run: gh release delete ${{ needs.prepare.outputs.tag }} --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          gh release create ${{ needs.prepare.outputs.tag }} artifacts/* \
            --title "${{ needs.prepare.outputs.tag }}" \
            --notes "**Windows**: click 'More info' → 'Run anyway' on first launch (unsigned binary).

          First launch downloads the embedded database — internet required once."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
